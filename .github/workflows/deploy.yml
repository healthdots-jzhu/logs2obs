# Required GitHub repository secrets:
#
#   AWS_REGION          — AWS region, e.g. "us-east-1"
#
#   AWS_ROLE_TO_ASSUME  — Full ARN of the IAM role GitHub Actions will assume via OIDC.
#                         Format: arn:aws:iam::{ACCOUNT_ID}:role/{ROLE_NAME}
#                         Example: arn:aws:iam::123456789012:role/logs2obs-github-deploy
#                         The role must have a trust policy granting:
#                           Principal: { Federated: "arn:aws:iam::{ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com" }
#                           Condition: StringLike "token.actions.githubusercontent.com:sub": "repo:{ORG}/{REPO}:*"
#                         And permissions: ecr:GetAuthorizationToken, ecr:BatchCheckLayerAvailability,
#                           ecr:PutImage, ecr:InitiateLayerUpload, ecr:UploadLayerPart,
#                           ecr:CompleteLayerUpload, ecs:UpdateService, ecs:DescribeServices
#
#   ECR_REGISTRY        — Your ECR registry hostname (NOT including the repo name).
#                         Format: {ACCOUNT_ID}.dkr.ecr.{REGION}.amazonaws.com
#                         Example: 123456789012.dkr.ecr.us-east-1.amazonaws.com
#                         Find it in AWS Console → ECR → any repository → URI (strip the repo name)
#                         Or run: aws ecr describe-registry --query registryId --output text
#                                 → prepend output + ".dkr.ecr.{region}.amazonaws.com"

name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  push-images:
    name: Push Docker images to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      api-image: ${{ steps.push.outputs.api-image }}
      worker-image: ${{ steps.push.outputs.worker-image }}
      puller-image: ${{ steps.push.outputs.puller-image }}
      queryengine-image: ${{ steps.push.outputs.queryengine-image }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push API image
        run: |
          docker build -f docker/Dockerfile.api -t ${{ env.ECR_REGISTRY }}/logs2obs-api:${{ github.sha }} -t ${{ env.ECR_REGISTRY }}/logs2obs-api:latest .
          docker push ${{ env.ECR_REGISTRY }}/logs2obs-api:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/logs2obs-api:latest
      
      - name: Build and push Worker image
        run: |
          docker build -f docker/Dockerfile.worker -t ${{ env.ECR_REGISTRY }}/logs2obs-worker:${{ github.sha }} -t ${{ env.ECR_REGISTRY }}/logs2obs-worker:latest .
          docker push ${{ env.ECR_REGISTRY }}/logs2obs-worker:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/logs2obs-worker:latest
      
      - name: Build and push Puller image
        run: |
          docker build -f docker/Dockerfile.puller -t ${{ env.ECR_REGISTRY }}/logs2obs-puller:${{ github.sha }} -t ${{ env.ECR_REGISTRY }}/logs2obs-puller:latest .
          docker push ${{ env.ECR_REGISTRY }}/logs2obs-puller:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/logs2obs-puller:latest
      
      - name: Build and push QueryEngine image
        run: |
          docker build -f docker/Dockerfile.queryengine -t ${{ env.ECR_REGISTRY }}/logs2obs-queryengine:${{ github.sha }} -t ${{ env.ECR_REGISTRY }}/logs2obs-queryengine:latest .
          docker push ${{ env.ECR_REGISTRY }}/logs2obs-queryengine:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/logs2obs-queryengine:latest
      
      - name: Set image outputs
        id: push
        run: |
          echo "api-image=${{ env.ECR_REGISTRY }}/logs2obs-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "worker-image=${{ env.ECR_REGISTRY }}/logs2obs-worker:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "puller-image=${{ env.ECR_REGISTRY }}/logs2obs-puller:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "queryengine-image=${{ env.ECR_REGISTRY }}/logs2obs-queryengine:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: push-images
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Update API service
        run: |
          aws ecs update-service \
            --cluster logs2obs-cluster \
            --service logs2obs-api \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Update Worker service
        run: |
          aws ecs update-service \
            --cluster logs2obs-cluster \
            --service logs2obs-worker \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Update Puller service
        run: |
          aws ecs update-service \
            --cluster logs2obs-cluster \
            --service logs2obs-puller \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Update QueryEngine service
        run: |
          aws ecs update-service \
            --cluster logs2obs-cluster \
            --service logs2obs-queryengine \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable --cluster logs2obs-cluster --services logs2obs-api --region ${{ secrets.AWS_REGION }}
          aws ecs wait services-stable --cluster logs2obs-cluster --services logs2obs-worker --region ${{ secrets.AWS_REGION }}
          aws ecs wait services-stable --cluster logs2obs-cluster --services logs2obs-puller --region ${{ secrets.AWS_REGION }}
          aws ecs wait services-stable --cluster logs2obs-cluster --services logs2obs-queryengine --region ${{ secrets.AWS_REGION }}
