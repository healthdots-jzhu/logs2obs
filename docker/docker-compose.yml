name: logs2obs

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: logs2obs
      POSTGRES_USER: logs2obs
      POSTGRES_PASSWORD: logs2obs
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logs2obs"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  logs2obs-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Database=logs2obs;Username=logs2obs;Password=logs2obs
      - MessageBus__RabbitMq__Host=rabbitmq
      - ObjectStore__MinIO__Endpoint=http://minio:9000
      - ObjectStore__MinIO__AccessKey=minioadmin
      - ObjectStore__MinIO__SecretKey=minioadmin
      - Search__MeiliSearch__Endpoint=http://meilisearch:7700
      - Metadata__Redis__ConnectionString=redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  logs2obs-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Database=logs2obs;Username=logs2obs;Password=logs2obs
      - MessageBus__RabbitMq__Host=rabbitmq
      - ObjectStore__MinIO__Endpoint=http://minio:9000
      - ObjectStore__MinIO__AccessKey=minioadmin
      - ObjectStore__MinIO__SecretKey=minioadmin
      - Search__MeiliSearch__Endpoint=http://meilisearch:7700
      - Metadata__Redis__ConnectionString=redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  logs2obs-puller:
    build:
      context: ..
      dockerfile: docker/Dockerfile.puller
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Database=logs2obs;Username=logs2obs;Password=logs2obs
      - MessageBus__RabbitMq__Host=rabbitmq
      - ObjectStore__MinIO__Endpoint=http://minio:9000
      - ObjectStore__MinIO__AccessKey=minioadmin
      - ObjectStore__MinIO__SecretKey=minioadmin
      - Search__MeiliSearch__Endpoint=http://meilisearch:7700
      - Metadata__Redis__ConnectionString=redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  logs2obs-queryengine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.queryengine
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Database=logs2obs;Username=logs2obs;Password=logs2obs
      - MessageBus__RabbitMq__Host=rabbitmq
      - ObjectStore__MinIO__Endpoint=http://minio:9000
      - ObjectStore__MinIO__AccessKey=minioadmin
      - ObjectStore__MinIO__SecretKey=minioadmin
      - Search__MeiliSearch__Endpoint=http://meilisearch:7700
      - Metadata__Redis__ConnectionString=redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_healthy }
      logs2obs-api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ai
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ../infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  minio_data:
  rabbitmq_data:
  postgres_data:
  redis_data:
  meilisearch_data:
  ollama_data:
  grafana_data:
